# CI/CD 配置

## GitHub Actions

```yaml
name: CI/CD

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_PASSWORD: testpass
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
      
      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
    
    - name: Cache pip packages
      uses: actions/cache@v3
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
        restore-keys: |
          ${{ runner.os }}-pip-
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pytest pytest-cov pytest-asyncio
    
    - name: Run tests
      run: |
        pytest tests/ -v --cov=src --cov-report=xml
    
    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v3
      with:
        file: ./coverage.xml
        flags: unittests
    
    - name: Run benchmarks
      run: |
        python tests/benchmark.py
    
    - name: Upload benchmark results
      uses: actions/upload-artifact@v3
      with:
        name: benchmark-results
        path: benchmark_results.json

  lint:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
    
    - name: Install linters
      run: |
        pip install ruff black mypy
    
    - name: Run ruff
      run: ruff check src/
    
    - name: Run black
      run: black --check src/
    
    - name: Run mypy
      run: mypy src/

  build:
    needs: [test, lint]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v2
    
    - name: Login to Docker Hub
      uses: docker/login-action@v2
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}
    
    - name: Build and push
      uses: docker/build-push-action@v4
      with:
        context: .
        push: true
        tags: |
          intelliteam:latest
          intelliteam:${{ github.sha }}
        cache-from: type=registry,ref=intelliteam:buildcache
        cache-to: type=registry,ref=intelliteam:buildcache,mode=max

  deploy:
    needs: build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    
    steps:
    - name: Deploy to production
      run: |
        # 部署脚本
        echo "Deploying to production..."
```

## GitLab CI/CD

```yaml
stages:
  - test
  - lint
  - build
  - deploy

variables:
  PIP_CACHE_DIR: "$CI_PROJECT_DIR/.cache/pip"

cache:
  paths:
    - .cache/pip
    - venv/

test:
  stage: test
  image: python:3.11
  services:
    - postgres:15
    - redis:7-alpine
  
  variables:
    POSTGRES_DB: intelliteam
    POSTGRES_USER: runner
    POSTGRES_PASSWORD: ""
  
  before_script:
    - pip install -r requirements.txt
    - pip install pytest pytest-cov
  
  script:
    - pytest tests/ -v --cov=src --cov-report=xml
  
  artifacts:
    reports:
      coverage_report:
        coverage_format: cobertura
        path: coverage.xml

lint:
  stage: lint
  image: python:3.11
  
  before_script:
    - pip install ruff black mypy
  
  script:
    - ruff check src/
    - black --check src/
    - mypy src/

build:
  stage: build
  image: docker:latest
  services:
    - docker:dind
  
  before_script:
    - docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY
  
  script:
    - docker build -t $CI_REGISTRY_IMAGE:$CI_COMMIT_SHA .
    - docker push $CI_REGISTRY_IMAGE:$CI_COMMIT_SHA
    - docker tag $CI_REGISTRY_IMAGE:$CI_COMMIT_SHA $CI_REGISTRY_IMAGE:latest
    - docker push $CI_REGISTRY_IMAGE:latest
  
  only:
    - main

deploy:
  stage: deploy
  image: alpine:latest
  
  before_script:
    - apk add --no-cache curl
  
  script:
    - echo "Deploying to production..."
    # 添加部署脚本
  
  only:
    - main
```

## 预提交钩子

```yaml
# .pre-commit-config.yaml
repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.4.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-added-large-files
  
  - repo: https://github.com/charliermarsh/ruff-pre-commit
    rev: v0.0.272
    hooks:
      - id: ruff
  
  - repo: https://github.com/psf/black
    rev: 23.3.0
    hooks:
      - id: black
  
  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.3.0
    hooks:
      - id: mypy
        additional_dependencies: [types-all]
```

## 部署自动化

```bash
#!/bin/bash
# deploy.sh

set -e

echo "🚀 Starting deployment..."

# 拉取最新代码
git pull origin main

# 构建 Docker 镜像
docker build -t intelliteam:latest .

# 停止旧容器
docker stop intelliteam || true
docker rm intelliteam || true

# 启动新容器
docker run -d \
  --name intelliteam \
  -p 8080:8080 \
  -e DB_URL=$DB_URL \
  -e REDIS_ENABLED=true \
  -v $(pwd)/logs:/app/logs \
  --restart unless-stopped \
  intelliteam:latest

# 等待服务启动
echo "⏳ Waiting for service to start..."
sleep 10

# 健康检查
echo "🏥 Running health check..."
curl -f http://localhost:8080/health || exit 1

# 清理旧镜像
echo "🧹 Cleaning up old images..."
docker image prune -f

echo "✅ Deployment completed!"
```
