# Alembic Configuration

[alembic]
# 迁移脚本路径
script_location = alembic

# 模型元数据
prepend_sys_path = .

# 数据库 URL（可通过环境变量覆盖）
sqlalchemy.url = sqlite+aiosqlite:///./intelliteam.db

# 时区
timezone = Asia/Shanghai

# 渲染批处理模式
render_as_batch = true

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
