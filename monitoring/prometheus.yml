# Prometheus 监控配置

# 抓取配置
scrape_configs:
  - job_name: 'intelliteam'
    static_configs:
      - targets: ['localhost:8000']
    metrics_path: '/metrics'
    scrape_interval: 15s

  - job_name: 'node'
    static_configs:
      - targets: ['localhost:9100']
    scrape_interval: 15s

# 告警规则
rule_files:
  - "alerts.yml"

# 告警管理器
alerting:
  alertmanagers:
    - static_configs:
        - targets:
          - localhost:9093
