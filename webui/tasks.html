<!DOCTYPE html>
<html lang="zh-CN" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#0d1117">
    <title>任务管理 - IntelliTeam</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="./static/js/vue.global.prod.js" defer></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script>
        window.tailwind = window.tailwind || {};
        window.tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        gh: {
                            bg: '#0d1117', canvas: '#161b22', elevated: '#21262d',
                            border: '#30363d', text: '#6A737D', light: '#e6edf3',
                            blue: '#0366D6', green: '#33BB22', yellow: '#F0C744', red: '#DA3633'
                        }
                    }
                }
            }
        }
    </script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: #0d1117; color: #e6edf3; }
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #0d1117; }
        ::-webkit-scrollbar-thumb { background: #30363d; border-radius: 4px; }
        .gh-card { background-color: #161b22; border: 1px solid #30363d; border-radius: 6px; }
        .gh-card-header { padding: 16px; border-bottom: 1px solid #30363d; font-weight: 600; }
        .gh-card-body { padding: 16px; }
        .nav-link { display: flex; align-items: center; height: 64px; padding: 0 16px; color: #8b949e; font-size: 14px; border-bottom: 2px solid transparent; text-decoration: none; transition: all 0.2s; }
        .nav-link:hover { color: #e6edf3; border-color: #30363d; }
        .nav-link.active { color: #fff; border-color: #f78166; }
        .gh-toolbar { height: 64px; background-color: #161b22; border-bottom: 1px solid #30363d; position: sticky; top: 0; z-index: 40; display: flex; align-items: center; padding: 0 16px; }
        .gh-input { width: 100%; padding: 5px 12px; background-color: #0d1117; border: 1px solid #30363d; border-radius: 6px; color: #e6edf3; }
        .gh-input:focus { border-color: #58a6ff; outline: none; }
        .gh-select { padding: 5px 12px; background-color: #21262d; border: 1px solid #30363d; border-radius: 6px; color: #e6edf3; }
        .btn-primary { background-color: #33BB22; color: #fff; border: 1px solid rgba(51,187,34,0.5); border-radius: 6px; padding: 5px 16px; cursor: pointer; }
        .btn-primary:hover { background-color: #2ea91f; }
        .btn-secondary { background-color: #21262d; color: #e6edf3; border: 1px solid #30363d; border-radius: 6px; padding: 5px 16px; cursor: pointer; }
        .btn-secondary:hover { background-color: #30363d; }
        .badge-success { background: rgba(51,187,34,0.15); color: #3fb950; border: 1px solid rgba(51,187,34,0.4); padding: 2px 8px; border-radius: 2em; font-size: 12px; }
        .badge-info { background: rgba(3,102,214,0.15); color: #58a6ff; border: 1px solid rgba(3,102,214,0.4); padding: 2px 8px; border-radius: 2em; font-size: 12px; }
        .badge-neutral { background: rgba(110,118,129,0.15); color: #8b949e; border: 1px solid rgba(110,118,129,0.4); padding: 2px 8px; border-radius: 2em; font-size: 12px; }
        .badge-warning { background: rgba(240,199,68,0.15); color: #d29922; border: 1px solid rgba(240,199,68,0.4); padding: 2px 8px; border-radius: 2em; font-size: 12px; }
    </style>
</head>
<body class="min-h-screen flex flex-col">
    <div id="app">
        <div v-if="loading" class="fixed inset-0 bg-gh-bg/95 z-50 flex items-center justify-center">
            <i class="fas fa-circle-notch text-4xl text-gh-blue loading-spin"></i>
        </div>

        <nav class="gh-toolbar">
            <div class="flex items-center justify-between w-full">
                <div class="flex items-center">
                    <a href="/" class="flex items-center space-x-3 text-white font-semibold">
                        <div class="w-8 h-8 bg-white/10 rounded-md flex items-center justify-center border border-white/20">
                            <i class="fas fa-robot"></i>
                        </div>
                        <span>IntelliTeam</span>
                    </a>
                    <div class="h-6 w-px bg-gh-border mx-2"></div>
                    <div class="hidden md:flex items-center">
                        <a href="/" class="nav-link"><i class="fas fa-home mr-2"></i>仪表盘</a>
                        <a href="/tasks" class="nav-link active"><i class="fas fa-tasks mr-2"></i>任务</a>
                        <a href="/agents" class="nav-link"><i class="fas fa-users mr-2"></i>Agent</a>
                        <a href="/workflows" class="nav-link"><i class="fas fa-project-diagram mr-2"></i>工作流</a>
                        <a href="/analytics" class="nav-link"><i class="fas fa-chart-line mr-2"></i>分析</a>
                        <a href="/tools" class="nav-link"><i class="fas fa-toolbox mr-2"></i>工具</a><a href="/skills" class="nav-link"><i class="fas fa-puzzle-piece mr-2"></i>技能</a>
                        <a href="/ai-assistant" class="nav-link"><i class="fas fa-robot mr-2"></i>AI 助手</a>
                    </div>
                </div>
            </div>
        </nav>

        <main class="flex-1 container mx-auto px-4 py-6">
            <tasks-view :tasks="tasks" :agents="agents"></tasks-view>
        </main>
    </div>

    <script type="module" defer>
        import { TasksView } from './static/js/components/TasksView.js';
        
        const { createApp } = window.Vue;
        
        createApp({
            components: { TasksView },
            data() {
                return {
                    loading: true,
                    tasks: [
                        { id: 1, title: '创建用户管理 API', description: '实现用户注册、登录、权限管理等功能', priority: 'high', status: 'in_progress', assignee: '张三', agent: 'Coder', createdAt: '2026-03-03' },
                        { id: 2, title: '数据库设计', description: '设计用户表和权限表结构', priority: 'normal', status: 'completed', assignee: '李四', agent: 'Architect', createdAt: '2026-03-03' },
                        { id: 3, title: '编写测试用例', description: '为 API 接口编写单元测试', priority: 'normal', status: 'pending', assignee: '王五', agent: 'Tester', createdAt: '2026-03-03' }
                    ],
                    agents: [
                        { name: 'Planner', role: '任务规划师', icon: 'fas fa-clipboard-list' },
                        { name: 'Architect', role: '系统架构师', icon: 'fas fa-building' },
                        { name: 'Coder', role: '代码工程师', icon: 'fas fa-laptop-code' },
                        { name: 'Tester', role: '测试工程师', icon: 'fas fa-vial' }
                    ]
                };
            },
            mounted() {
                setTimeout(() => { this.loading = false; }, 500);
            }
        }).mount('#app');
    </script>
</body>
</html>
