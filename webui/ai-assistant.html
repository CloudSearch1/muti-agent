<!DOCTYPE html>
<html lang="zh-CN" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#0d1117">
    <title>AI 助手 - IntelliTeam</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/vue@3.4.21/dist/vue.global.prod.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script>
        window.tailwind = window.tailwind || {};
        window.tailwind.config = {
            darkMode: 'class',
            theme: { 
                extend: { 
                    colors: { 
                        gh: { 
                            bg: '#0d1117', 
                            canvas: '#161b22', 
                            elevated: '#21262d', 
                            border: '#30363d', 
                            text: '#6A737D', 
                            light: '#e6edf3', 
                            blue: '#0366D6', 
                            green: '#33BB22', 
                            purple: '#8957e5' 
                        } 
                    } 
                } 
            }
        }
    </script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: #0d1117; color: #e6edf3; }
        .gh-card { background-color: #161b22; border: 1px solid #30363d; border-radius: 6px; }
        .gh-card-header { padding: 16px; border-bottom: 1px solid #30363d; font-weight: 600; }
        .gh-card-body { padding: 16px; }
        .nav-link { display: flex; align-items: center; height: 64px; padding: 0 16px; color: #8b949e; font-size: 14px; border-bottom: 2px solid transparent; text-decoration: none; transition: all 0.2s; }
        .nav-link:hover { color: #e6edf3; border-color: #30363d; }
        .nav-link.active { color: #fff; border-color: #f78166; }
        .gh-toolbar { height: 64px; background-color: #161b22; border-bottom: 1px solid #30363d; position: sticky; top: 0; z-index: 40; display: flex; align-items: center; padding: 0 16px; }
        .gh-input { padding: 12px; background-color: #0d1117; border: 1px solid #30363d; border-radius: 6px; color: #e6edf3; }
        .gh-input:focus { border-color: #58a6ff; outline: none; }
        .btn-primary { background-color: #33BB22; color: #fff; border: 1px solid rgba(51,187,34,0.5); border-radius: 6px; padding: 8px 16px; cursor: pointer; }
        
        /* 滚动条样式 */
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: #161b22; }
        ::-webkit-scrollbar-thumb { background: #30363d; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #484f58; }
        
        /* 代码块样式 */
        pre { background: #0d1117; padding: 12px; border-radius: 6px; overflow-x: auto; }
        code { font-family: 'SF Mono', Monaco, 'Cascadia Code', monospace; font-size: 0.875em; }
        
        /* 动画 */
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
        .animate-pulse { animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite; }
        
        /* 行数限制 */
        .line-clamp-2 {
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }
    </style>
</head>
<body class="min-h-screen flex flex-col">
    <div id="app">
        <!-- 导航栏 -->
        <nav class="gh-toolbar">
            <div class="flex items-center justify-between w-full">
                <div class="flex items-center">
                    <a href="/" class="flex items-center space-x-3 text-white font-semibold">
                        <div class="w-8 h-8 bg-white/10 rounded-md flex items-center justify-center border border-white/20">
                            <i class="fas fa-robot"></i>
                        </div>
                        <span>IntelliTeam</span>
                    </a>
                    <div class="h-6 w-px bg-gh-border mx-2"></div>
                    <div class="hidden md:flex items-center">
                        <a href="/" class="nav-link"><i class="fas fa-home mr-2"></i>仪表盘</a>
                        <a href="/tasks" class="nav-link"><i class="fas fa-tasks mr-2"></i>任务</a>
                        <a href="/agents" class="nav-link"><i class="fas fa-users mr-2"></i>Agent</a>
                        <a href="/workflows" class="nav-link"><i class="fas fa-project-diagram mr-2"></i>工作流</a>
                        <a href="/analytics" class="nav-link"><i class="fas fa-chart-line mr-2"></i>分析</a>
                        <a href="/tools" class="nav-link"><i class="fas fa-toolbox mr-2"></i>工具</a>
                        <a href="/skills" class="nav-link"><i class="fas fa-puzzle-piece mr-2"></i>技能</a>
                        <a href="/ai-assistant" class="nav-link active"><i class="fas fa-robot mr-2"></i>AI 助手</a>
                    </div>
                </div>
                <div class="flex items-center gap-3">
                    <button @click="toggleTheme" class="w-9 h-9 rounded-lg flex items-center justify-center text-gh-text hover:text-white hover:bg-gh-elevated transition" title="切换主题">
                        <i class="fas" :class="isDark ? 'fa-moon' : 'fa-sun'"></i>
                    </button>
                </div>
            </div>
        </nav>
        
        <!-- 主内容区 -->
        <main class="flex-1 container mx-auto px-4 py-6">
            <ai-assistant-view :settings="settings"></ai-assistant-view>
        </main>
    </div>
    
    <!-- 引入 marked 用于 Markdown 渲染 -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    
    <script type="module">
        import { AIAssistantView } from './static/js/components/AIAssistantView.js';
        
        const { createApp } = window.Vue;
        
        createApp({
            components: { AIAssistantView },
            data() {
                return {
                    isDark: true,
                    messages: [],
                    settings: {
                        aiProvider: 'bailian',
                        model: 'qwen3.5-plus',
                        apiKey: ''
                    }
                };
            },
            methods: {
                toggleTheme() {
                    this.isDark = !this.isDark;
                    if (this.isDark) {
                        document.documentElement.classList.add('dark');
                    } else {
                        document.documentElement.classList.remove('dark');
                    }
                }
            },
            mounted() {
                // 初始化主题
                const savedTheme = localStorage.getItem('theme');
                if (savedTheme) {
                    this.isDark = savedTheme === 'dark';
                }
                if (this.isDark) {
                    document.documentElement.classList.add('dark');
                } else {
                    document.documentElement.classList.remove('dark');
                }
            }
        }).mount('#app');
    </script>
</body>
</html>
