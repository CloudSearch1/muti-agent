<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 助手 - IntelliTeam</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/vue/3.3.4/vue.global.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/marked/9.1.2/marked.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/languages/python.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/languages/javascript.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/languages/bash.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/languages/json.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Noto Sans', Helvetica, Arial, sans-serif;
            background: #0d1117;
            color: #e6edf3;
            height: 100vh;
            overflow: hidden;
        }

        #app {
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* 头部导航 */
        .header {
            height: 60px;
            background: #161b22;
            border-bottom: 1px solid #30363d;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 20px;
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .logo {
            font-size: 20px;
            font-weight: 600;
            color: #fff;
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .logo i {
            color: #33BB22;
        }

        .nav-links {
            display: flex;
            gap: 20px;
        }

        .nav-links a {
            color: #8b949e;
            text-decoration: none;
            font-size: 14px;
            padding: 6px 12px;
            border-radius: 6px;
            transition: all 0.2s;
        }

        .nav-links a:hover {
            color: #e6edf3;
            background: #21262d;
        }

        .nav-links a.active {
            color: #fff;
            background: #238636;
        }

        /* 主内容区 */
        .main-content {
            flex: 1;
            display: flex;
            overflow: hidden;
        }

        /* 文件浏览器侧边栏 */
        .file-sidebar {
            width: 260px;
            background: #161b22;
            border-right: 1px solid #30363d;
            display: flex;
            flex-direction: column;
        }

        .sidebar-header {
            padding: 15px;
            border-bottom: 1px solid #30363d;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .sidebar-title {
            font-size: 14px;
            font-weight: 600;
            color: #e6edf3;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .file-tree {
            flex: 1;
            overflow-y: auto;
            padding: 10px;
        }

        .file-item {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 6px 10px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 13px;
            color: #8b949e;
            transition: all 0.2s;
        }

        .file-item:hover {
            background: #21262d;
            color: #e6edf3;
        }

        .file-item i {
            width: 16px;
            text-align: center;
        }

        .file-item.folder {
            color: #58a6ff;
        }

        .file-item.file {
            color: #8b949e;
        }

        /* 聊天区域 */
        .chat-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: #0d1117;
        }

        .chat-header {
            height: 60px;
            background: #161b22;
            border-bottom: 1px solid #30363d;
            display: flex;
            align-items: center;
            padding: 0 20px;
            gap: 15px;
        }

        .chat-header-icon {
            width: 40px;
            height: 40px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
        }

        .chat-header-info h2 {
            font-size: 16px;
            font-weight: 600;
            color: #e6edf3;
            margin-bottom: 2px;
        }

        .chat-header-info p {
            font-size: 12px;
            color: #8b949e;
        }

        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
        }

        .welcome-message {
            text-align: center;
            padding: 40px 20px;
        }

        .welcome-icon {
            width: 80px;
            height: 80px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 20px;
            font-size: 36px;
        }

        .welcome-message h3 {
            font-size: 24px;
            font-weight: 600;
            color: #e6edf3;
            margin-bottom: 10px;
        }

        .welcome-message p {
            font-size: 14px;
            color: #8b949e;
            margin-bottom: 30px;
        }

        .quick-actions {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            justify-content: center;
            max-width: 600px;
            margin: 0 auto;
        }

        .quick-action-btn {
            padding: 10px 16px;
            background: #21262d;
            border: 1px solid #30363d;
            border-radius: 8px;
            color: #8b949e;
            font-size: 13px;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .quick-action-btn:hover {
            background: #30363d;
            border-color: #58a6ff;
            color: #e6edf3;
        }

        .message {
            display: flex;
            gap: 12px;
            margin-bottom: 20px;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .message-avatar {
            width: 36px;
            height: 36px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            flex-shrink: 0;
        }

        .message-avatar.user {
            background: #238636;
        }

        .message-avatar.assistant {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }

        .message-content {
            flex: 1;
            max-width: calc(100% - 60px);
        }

        .message-header {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 6px;
        }

        .message-author {
            font-size: 13px;
            font-weight: 600;
            color: #e6edf3;
        }

        .message-time {
            font-size: 11px;
            color: #6e7681;
        }

        .message-body {
            font-size: 14px;
            line-height: 1.6;
            color: #e6edf3;
        }

        .message-body pre {
            background: #161b22;
            border: 1px solid #30363d;
            border-radius: 8px;
            padding: 12px;
            margin: 10px 0;
            overflow-x: auto;
        }

        .message-body code {
            font-family: 'SFMono-Regular', Consolas, 'Liberation Mono', Menlo, monospace;
            font-size: 13px;
        }

        .message-body p {
            margin-bottom: 10px;
        }

        /* 输入区域 */
        .chat-input-area {
            padding: 15px 20px;
            background: #161b22;
            border-top: 1px solid #30363d;
        }

        .input-container {
            display: flex;
            gap: 10px;
            align-items: flex-end;
        }

        .input-wrapper {
            flex: 1;
            background: #0d1117;
            border: 1px solid #30363d;
            border-radius: 12px;
            padding: 12px;
        }

        .input-wrapper:focus-within {
            border-color: #58a6ff;
        }

        .chat-textarea {
            width: 100%;
            background: transparent;
            border: none;
            color: #e6edf3;
            font-size: 14px;
            resize: none;
            outline: none;
            min-height: 20px;
            max-height: 120px;
        }

        .input-actions {
            display: flex;
            gap: 8px;
            margin-top: 8px;
        }

        .input-action-btn {
            padding: 4px 8px;
            background: transparent;
            border: none;
            color: #6e7681;
            font-size: 12px;
            cursor: pointer;
            border-radius: 4px;
            transition: all 0.2s;
        }

        .input-action-btn:hover {
            color: #e6edf3;
            background: #21262d;
        }

        .send-btn {
            width: 40px;
            height: 40px;
            background: #238636;
            border: none;
            border-radius: 10px;
            color: #fff;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .send-btn:hover {
            background: #2ea043;
        }

        .send-btn:disabled {
            background: #21262d;
            color: #6e7681;
            cursor: not-allowed;
        }

        /* 移动端适配 */
        @media (max-width: 768px) {
            .file-sidebar {
                display: none;
            }

            .nav-links {
                display: none;
            }

            .quick-actions {
                flex-direction: column;
            }
        }

        /* 滚动条样式 */
        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }

        ::-webkit-scrollbar-track {
            background: #0d1117;
        }

        ::-webkit-scrollbar-thumb {
            background: #30363d;
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: #6e7681;
        }
    </style>
</head>
<body>
    <div id="app">
        <!-- 头部导航 -->
        <header class="header">
            <div class="header-left">
                <a href="/" class="logo">
                    <i class="fas fa-robot"></i>
                    IntelliTeam
                </a>
                <nav class="nav-links">
                    <a href="/">首页</a>
                    <a href="/">任务</a>
                    <a href="/">智能体</a>
                    <a href="/">技能</a>
                    <a href="/ai-assistant.html" class="active">
                        <i class="fas fa-robot"></i> AI助手
                    </a>
                </nav>
            </div>
            <div class="header-right">
                <!-- 可以添加用户头像等 -->
            </div>
        </header>

        <!-- 主内容区 -->
        <div class="main-content">
            <!-- 文件浏览器侧边栏 -->
            <aside class="file-sidebar">
                <div class="sidebar-header">
                    <span class="sidebar-title">
                        <i class="fas fa-folder-open"></i>
                        项目文件
                    </span>
                    <button @click="refreshFileTree" class="input-action-btn">
                        <i class="fas fa-sync-alt"></i>
                    </button>
                </div>
                <div class="file-tree">
                    <div v-for="item in fileTree" :key="item.path" 
                         :class="['file-item', item.type]"
                         @click="selectFile(item)">
                        <i :class="item.type === 'folder' ? 'fas fa-folder' : 'fas fa-file'"></i>
                        <span>{{ item.name }}</span>
                    </div>
                </div>
            </aside>

            <!-- 聊天区域 -->
            <main class="chat-area">
                <div class="chat-header">
                    <div class="chat-header-icon">
                        <i class="fas fa-robot"></i>
                    </div>
                    <div class="chat-header-info">
                        <h2>AI 助手</h2>
                        <p>基于 Claude 的智能研发助手</p>
                    </div>
                </div>

                <div class="chat-messages" ref="messagesContainer">
                    <!-- 欢迎消息 -->
                    <div v-if="messages.length === 0" class="welcome-message">
                        <div class="welcome-icon">
                            <i class="fas fa-robot"></i>
                        </div>
                        <h3>我是您的智能研发助手</h3>
                        <p>我可以帮您编写代码、调试程序、管理项目文件，让开发更高效</p>
                        <div class="quick-actions">
                            <button class="quick-action-btn" @click="sendQuickMessage('帮我写一个 Python 函数来计算斐波那契数列')">
                                <i class="fas fa-code"></i>
                                编写代码
                            </button>
                            <button class="quick-action-btn" @click="sendQuickMessage('帮我调试这个错误')">
                                <i class="fas fa-bug"></i>
                                调试程序
                            </button>
                            <button class="quick-action-btn" @click="sendQuickMessage('帮我优化这段代码的性能')">
                                <i class="fas fa-tachometer-alt"></i>
                                优化性能
                            </button>
                            <button class="quick-action-btn" @click="sendQuickMessage('帮我生成项目的 README 文档')">
                                <i class="fas fa-file-alt"></i>
                                生成文档
                            </button>
                        </div>
                    </div>

                    <!-- 消息列表 -->
                    <div v-for="(msg, index) in messages" :key="index" class="message">
                        <div :class="['message-avatar', msg.role]">
                            <i :class="msg.role === 'user' ? 'fas fa-user' : 'fas fa-robot'"></i>
                        </div>
                        <div class="message-content">
                            <div class="message-header">
                                <span class="message-author">{{ msg.role === 'user' ? '您' : 'AI 助手' }}</span>
                                <span class="message-time">{{ formatTime(msg.time) }}</span>
                            </div>
                            <div class="message-body" v-html="renderMarkdown(msg.content)"></div>
                        </div>
                    </div>

                    <!-- 加载指示器 -->
                    <div v-if="isLoading" class="message">
                        <div class="message-avatar assistant">
                            <i class="fas fa-robot"></i>
                        </div>
                        <div class="message-content">
                            <div class="message-header">
                                <span class="message-author">AI 助手</span>
                            </div>
                            <div class="message-body">
                                <i class="fas fa-spinner fa-spin"></i> 正在思考...
                            </div>
                        </div>
                    </div>
                </div>

                <div class="chat-input-area">
                    <div class="input-container">
                        <div class="input-wrapper">
                            <textarea 
                                class="chat-textarea"
                                v-model="inputMessage"
                                @keydown.enter.prevent="sendMessage"
                                placeholder="输入消息，按 Enter 发送..."
                                rows="1"
                                @input="autoResize"
                                ref="textarea"
                            ></textarea>
                            <div class="input-actions">
                                <button class="input-action-btn" @click="attachFile">
                                    <i class="fas fa-paperclip"></i> 附件
                                </button>
                                <button class="input-action-btn" @click="clearChat">
                                    <i class="fas fa-trash"></i> 清空
                                </button>
                            </div>
                        </div>
                        <button 
                            class="send-btn" 
                            @click="sendMessage"
                            :disabled="!inputMessage.trim() || isLoading"
                        >
                            <i class="fas fa-paper-plane"></i>
                        </button>
                    </div>
                </div>
            </main>
        </div>
    </div>

    <script>
        const { createApp } = Vue;

        createApp({
            data() {
                return {
                    messages: [],
                    inputMessage: '',
                    isLoading: false,
                    fileTree: [
                        { name: 'src', type: 'folder', path: 'src' },
                        { name: 'webui', type: 'folder', path: 'webui' },
                        { name: 'tests', type: 'folder', path: 'tests' },
                        { name: 'README.md', type: 'file', path: 'README.md' },
                        { name: 'requirements.txt', type: 'file', path: 'requirements.txt' },
                        { name: 'pyproject.toml', type: 'file', path: 'pyproject.toml' }
                    ],
                    sessionId: 'session-' + Date.now()
                }
            },
            mounted() {
                this.loadChatHistory();
                marked.setOptions({
                    highlight: function(code, lang) {
                        if (lang && hljs.getLanguage(lang)) {
                            return hljs.highlight(code, { language: lang }).value;
                        }
                        return hljs.highlightAuto(code).value;
                    }
                });
            },
            methods: {
                async sendMessage() {
                    const message = this.inputMessage.trim();
                    if (!message || this.isLoading) return;

                    // 添加用户消息
                    this.messages.push({
                        role: 'user',
                        content: message,
                        time: new Date()
                    });

                    this.inputMessage = '';
                    this.autoResize();
                    this.scrollToBottom();

                    // 发送给 AI
                    this.isLoading = true;
                    try {
                        const response = await fetch('/api/v1/chat', {
                            method: 'POST',
                            headers: {
                                'Content-Type': 'application/json'
                            },
                            body: JSON.stringify({
                                messages: this.messages.map(m => ({
                                    role: m.role,
                                    content: m.content
                                })),
                                stream: false
                            })
                        });

                        if (response.ok) {
                            const data = await response.json();
                            this.messages.push({
                                role: 'assistant',
                                content: data.response || '抱歉，我无法处理您的请求。',
                                time: new Date()
                            });
                        } else {
                            throw new Error('API 请求失败');
                        }
                    } catch (error) {
                        console.error('发送消息失败:', error);
                        this.messages.push({
                            role: 'assistant',
                            content: '抱歉，连接 AI 服务失败，请稍后重试。',
                            time: new Date()
                        });
                    } finally {
                        this.isLoading = false;
                        this.scrollToBottom();
                        this.saveChatHistory();
                    }
                },

                sendQuickMessage(message) {
                    this.inputMessage = message;
                    this.sendMessage();
                },

                renderMarkdown(content) {
                    return marked.parse(content);
                },

                formatTime(date) {
                    if (!date) return '';
                    const d = new Date(date);
                    return d.toLocaleTimeString('zh-CN', { hour: '2-digit', minute: '2-digit' });
                },

                scrollToBottom() {
                    this.$nextTick(() => {
                        const container = this.$refs.messagesContainer;
                        if (container) {
                            container.scrollTop = container.scrollHeight;
                        }
                    });
                },

                autoResize() {
                    this.$nextTick(() => {
                        const textarea = this.$refs.textarea;
                        if (textarea) {
                            textarea.style.height = 'auto';
                            textarea.style.height = Math.min(textarea.scrollHeight, 120) + 'px';
                        }
                    });
                },

                selectFile(file) {
                    if (file.type === 'file') {
                        this.inputMessage = `帮我查看和编辑文件：${file.path}`;
                    }
                },

                refreshFileTree() {
                    // 刷新文件树
                    console.log('刷新文件树');
                },

                attachFile() {
                    // 附件功能
                    console.log('附件功能');
                },

                clearChat() {
                    if (confirm('确定要清空所有聊天记录吗？')) {
                        this.messages = [];
                        localStorage.removeItem('chatHistory');
                    }
                },

                saveChatHistory() {
                    localStorage.setItem('chatHistory', JSON.stringify(this.messages));
                },

                loadChatHistory() {
                    const history = localStorage.getItem('chatHistory');
                    if (history) {
                        this.messages = JSON.parse(history);
                    }
                }
            }
        }).mount('#app');
    </script>
</body>
</html>
