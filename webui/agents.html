<!DOCTYPE html>
<html lang="zh-CN" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#0d1117">
    <title>Agent 管理 - IntelliTeam</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/vue@3.4.21/dist/vue.global.prod.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script>
        window.tailwind = window.tailwind || {};
        window.tailwind.config = {
            darkMode: 'class',
            theme: { extend: { colors: { gh: { bg: '#0d1117', canvas: '#161b22', elevated: '#21262d', border: '#30363d', text: '#6A737D', light: '#e6edf3', blue: '#0366D6', green: '#33BB22', red: '#DA3633', purple: '#8957e5' } } } }
        }
    </script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: #0d1117; color: #e6edf3; }
        .gh-card { background-color: #161b22; border: 1px solid #30363d; border-radius: 6px; }
        .gh-card-header { padding: 16px; border-bottom: 1px solid #30363d; font-weight: 600; }
        .gh-card-body { padding: 16px; }
        .nav-link { display: flex; align-items: center; height: 64px; padding: 0 16px; color: #8b949e; font-size: 14px; border-bottom: 2px solid transparent; text-decoration: none; transition: all 0.2s; }
        .nav-link:hover { color: #e6edf3; border-color: #30363d; }
        .nav-link.active { color: #fff; border-color: #f78166; }
        .gh-toolbar { height: 64px; background-color: #161b22; border-bottom: 1px solid #30363d; position: sticky; top: 0; z-index: 40; display: flex; align-items: center; padding: 0 16px; }
        .badge-success { background: rgba(51,187,34,0.15); color: #3fb950; border: 1px solid rgba(51,187,34,0.4); padding: 2px 8px; border-radius: 2em; font-size: 12px; }
        .badge-warning { background: rgba(240,199,68,0.15); color: #d29922; border: 1px solid rgba(240,199,68,0.4); padding: 2px 8px; border-radius: 2em; font-size: 12px; }
        .card-hover { transition: all 0.2s; border: 1px solid #30363d; }
        .card-hover:hover { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(0,0,0,0.4); }
    </style>
</head>
<body class="min-h-screen flex flex-col">
    <div id="app">
        <nav class="gh-toolbar">
            <div class="flex items-center justify-between w-full">
                <div class="flex items-center">
                    <a href="/" class="flex items-center space-x-3 text-white font-semibold">
                        <div class="w-8 h-8 bg-white/10 rounded-md flex items-center justify-center border border-white/20"><i class="fas fa-robot"></i></div>
                        <span>IntelliTeam</span>
                    </a>
                    <div class="h-6 w-px bg-gh-border mx-2"></div>
                    <div class="hidden md:flex items-center">
                        <a href="/" class="nav-link"><i class="fas fa-home mr-2"></i>仪表盘</a>
                        <a href="/tasks" class="nav-link"><i class="fas fa-tasks mr-2"></i>任务</a>
                        <a href="/agents" class="nav-link active"><i class="fas fa-users mr-2"></i>Agent</a>
                        <a href="/workflows" class="nav-link"><i class="fas fa-project-diagram mr-2"></i>工作流</a>
                        <a href="/analytics" class="nav-link"><i class="fas fa-chart-line mr-2"></i>分析</a>
                        <a href="/tools" class="nav-link"><i class="fas fa-toolbox mr-2"></i>工具</a><a href="/skills" class="nav-link"><i class="fas fa-puzzle-piece mr-2"></i>技能</a>
                        <a href="/ai-assistant" class="nav-link"><i class="fas fa-robot mr-2"></i>AI 助手</a>
                    </div>
                </div>
            </div>
        </nav>
        <main class="flex-1 container mx-auto px-4 py-6">
            <agents-view :agents="agents"></agents-view>
        </main>
    </div>
    <script type="module">
        import { AgentsView } from './static/js/components/AgentsView.js';
        const { createApp } = Vue;
        createApp({
            components: { AgentsView },
            data() {
                return {
                    agents: [
                        { name: 'Planner', role: '任务规划师', icon: 'fas fa-clipboard-list', description: '负责任务分解和优先级排序', status: 'idle', tasksCompleted: 45, avgTime: 2.3, successRate: 98 },
                        { name: 'Architect', role: '系统架构师', icon: 'fas fa-building', description: '负责系统架构设计和技术选型', status: 'busy', tasksCompleted: 38, avgTime: 5.7, successRate: 96 },
                        { name: 'Coder', role: '代码工程师', icon: 'fas fa-laptop-code', description: '负责代码实现和功能开发', status: 'busy', tasksCompleted: 89, avgTime: 8.2, successRate: 94 },
                        { name: 'Tester', role: '测试工程师', icon: 'fas fa-vial', description: '负责测试用例和质量保障', status: 'idle', tasksCompleted: 67, avgTime: 4.5, successRate: 97 },
                        { name: 'DocWriter', role: '文档工程师', icon: 'fas fa-file-alt', description: '负责技术文档编写', status: 'idle', tasksCompleted: 52, avgTime: 3.8, successRate: 99 }
                    ]
                };
            }
        }).mount('#app');
    </script>
</body>
</html>
