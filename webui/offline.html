<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>离线 - IntelliTeam</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
        }
        .container {
            text-align: center;
            padding: 2rem;
            max-width: 500px;
        }
        h1 { font-size: 3rem; margin-bottom: 1rem; }
        p { font-size: 1.2rem; margin-bottom: 2rem; opacity: 0.9; }
        .icon { font-size: 5rem; margin-bottom: 1rem; }
        button {
            background: white;
            color: #667eea;
            border: none;
            padding: 1rem 2rem;
            font-size: 1rem;
            border-radius: 8px;
            cursor: pointer;
            transition: transform 0.2s;
        }
        button:hover { transform: scale(1.05); }
        .status { margin-top: 2rem; padding: 1rem; background: rgba(255,255,255,0.1); border-radius: 8px; }
    </style>
</head>
<body>
    <div class="container">
        <div class="icon">📡</div>
        <h1>离线了</h1>
        <p>似乎与服务器失去了连接，请检查网络设置</p>
        
        <button onclick="location.reload()">
            🔄 重试连接
        </button>
        
        <div class="status">
            <p><strong>提示：</strong></p>
            <p>• 部分功能仍可在离线状态下使用</p>
            <p>• 操作会自动保存，网络恢复后同步</p>
            <p>• 按 <kbd>Ctrl+R</kbd> 刷新页面</p>
        </div>
    </div>
    
    <script>
        // 监听网络状态
        function updateStatus() {
            if (navigator.onLine) {
                document.querySelector('.icon').textContent = '✅';
                document.querySelector('h1').textContent = '已连接！';
                document.querySelector('p').textContent = '网络已恢复，正在重新加载...';
                setTimeout(() => location.reload(), 1000);
            }
        }
        
        window.addEventListener('online', updateStatus);
        window.addEventListener('offline', () => {
            document.querySelector('.icon').textContent = '📡';
            document.querySelector('h1').textContent = '离线了';
        });
        
        // 初始检查
        updateStatus();
    </script>
</body>
</html>
