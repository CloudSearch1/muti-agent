<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 助手 - IntelliTeam (离线版)</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Noto Sans', Helvetica, Arial, sans-serif;
            background: #0d1117;
            color: #e6edf3;
            height: 100vh;
            overflow: hidden;
        }

        #app {
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* 头部导航 */
        .header {
            height: 60px;
            background: #161b22;
            border-bottom: 1px solid #30363d;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 20px;
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .logo {
            font-size: 20px;
            font-weight: 600;
            color: #fff;
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .logo svg {
            color: #33BB22;
        }

        .nav-links {
            display: flex;
            gap: 20px;
        }

        .nav-links a {
            color: #8b949e;
            text-decoration: none;
            font-size: 14px;
            padding: 6px 12px;
            border-radius: 6px;
            transition: all 0.2s;
        }

        .nav-links a:hover {
            color: #e6edf3;
            background: #21262d;
        }

        .nav-links a.active {
            color: #fff;
            background: #238636;
        }

        .offline-badge {
            background: #f59e0b;
            color: #000;
            font-size: 11px;
            padding: 2px 8px;
            border-radius: 10px;
            font-weight: 600;
        }

        /* 主内容区 */
        .main-content {
            flex: 1;
            display: flex;
            overflow: hidden;
        }

        /* 文件浏览器侧边栏 */
        .file-sidebar {
            width: 260px;
            background: #161b22;
            border-right: 1px solid #30363d;
            display: flex;
            flex-direction: column;
        }

        .sidebar-header {
            padding: 15px;
            border-bottom: 1px solid #30363d;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .sidebar-title {
            font-size: 14px;
            font-weight: 600;
            color: #e6edf3;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .file-tree {
            flex: 1;
            overflow-y: auto;
            padding: 10px;
        }

        .file-item {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 6px 10px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 13px;
            color: #8b949e;
            transition: all 0.2s;
        }

        .file-item:hover {
            background: #21262d;
            color: #e6edf3;
        }

        .file-item svg {
            width: 16px;
            height: 16px;
            flex-shrink: 0;
        }

        .file-item.folder {
            color: #58a6ff;
        }

        .file-item.file {
            color: #8b949e;
        }

        /* 聊天区域 */
        .chat-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: #0d1117;
        }

        .chat-header {
            height: 60px;
            background: #161b22;
            border-bottom: 1px solid #30363d;
            display: flex;
            align-items: center;
            padding: 0 20px;
            gap: 15px;
        }

        .chat-header-icon {
            width: 40px;
            height: 40px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .chat-header-icon svg {
            width: 20px;
            height: 20px;
            color: #fff;
        }

        .chat-header-info h2 {
            font-size: 16px;
            font-weight: 600;
            color: #e6edf3;
            margin-bottom: 2px;
        }

        .chat-header-info p {
            font-size: 12px;
            color: #8b949e;
        }

        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
        }

        .welcome-message {
            text-align: center;
            padding: 40px 20px;
        }

        .welcome-icon {
            width: 80px;
            height: 80px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 20px;
        }

        .welcome-icon svg {
            width: 40px;
            height: 40px;
            color: #fff;
        }

        .welcome-message h3 {
            font-size: 24px;
            font-weight: 600;
            color: #e6edf3;
            margin-bottom: 10px;
        }

        .welcome-message p {
            font-size: 14px;
            color: #8b949e;
            margin-bottom: 30px;
        }

        .quick-actions {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            justify-content: center;
            max-width: 600px;
            margin: 0 auto;
        }

        .quick-action-btn {
            padding: 10px 16px;
            background: #21262d;
            border: 1px solid #30363d;
            border-radius: 8px;
            color: #8b949e;
            font-size: 13px;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .quick-action-btn:hover {
            background: #30363d;
            border-color: #58a6ff;
            color: #e6edf3;
        }

        .quick-action-btn svg {
            width: 14px;
            height: 14px;
        }

        .message {
            display: flex;
            gap: 12px;
            margin-bottom: 20px;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .message-avatar {
            width: 36px;
            height: 36px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }

        .message-avatar svg {
            width: 16px;
            height: 16px;
            color: #fff;
        }

        .message-avatar.user {
            background: #238636;
        }

        .message-avatar.assistant {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }

        .message-content {
            flex: 1;
            max-width: calc(100% - 60px);
        }

        .message-header {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 6px;
        }

        .message-author {
            font-size: 13px;
            font-weight: 600;
            color: #e6edf3;
        }

        .message-time {
            font-size: 11px;
            color: #6e7681;
        }

        .message-body {
            font-size: 14px;
            line-height: 1.6;
            color: #e6edf3;
        }

        .message-body pre {
            background: #161b22;
            border: 1px solid #30363d;
            border-radius: 8px;
            padding: 12px;
            margin: 10px 0;
            overflow-x: auto;
        }

        .message-body code {
            font-family: 'SFMono-Regular', Consolas, 'Liberation Mono', Menlo, monospace;
            font-size: 13px;
            background: #161b22;
            padding: 2px 6px;
            border-radius: 4px;
        }

        .message-body pre code {
            background: transparent;
            padding: 0;
        }

        .message-body p {
            margin-bottom: 10px;
        }

        .message-body ul, .message-body ol {
            margin: 10px 0;
            padding-left: 20px;
        }

        .message-body li {
            margin-bottom: 5px;
        }

        /* 输入区域 */
        .chat-input-area {
            padding: 15px 20px;
            background: #161b22;
            border-top: 1px solid #30363d;
        }

        .input-container {
            display: flex;
            gap: 10px;
            align-items: flex-end;
        }

        .input-wrapper {
            flex: 1;
            background: #0d1117;
            border: 1px solid #30363d;
            border-radius: 12px;
            padding: 12px;
        }

        .input-wrapper:focus-within {
            border-color: #58a6ff;
        }

        .chat-textarea {
            width: 100%;
            background: transparent;
            border: none;
            color: #e6edf3;
            font-size: 14px;
            resize: none;
            outline: none;
            min-height: 20px;
            max-height: 120px;
            font-family: inherit;
        }

        .chat-textarea::placeholder {
            color: #6e7681;
        }

        .input-actions {
            display: flex;
            gap: 8px;
            margin-top: 8px;
        }

        .input-action-btn {
            padding: 4px 8px;
            background: transparent;
            border: none;
            color: #6e7681;
            font-size: 12px;
            cursor: pointer;
            border-radius: 4px;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .input-action-btn:hover {
            color: #e6edf3;
            background: #21262d;
        }

        .input-action-btn svg {
            width: 12px;
            height: 12px;
        }

        .send-btn {
            width: 40px;
            height: 40px;
            background: #238636;
            border: none;
            border-radius: 10px;
            color: #fff;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .send-btn:hover {
            background: #2ea043;
        }

        .send-btn:disabled {
            background: #21262d;
            color: #6e7681;
            cursor: not-allowed;
        }

        .send-btn svg {
            width: 16px;
            height: 16px;
        }

        /* 移动端适配 */
        @media (max-width: 768px) {
            .file-sidebar {
                display: none;
            }

            .nav-links {
                display: none;
            }

            .quick-actions {
                flex-direction: column;
            }
        }

        /* 滚动条样式 */
        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }

        ::-webkit-scrollbar-track {
            background: #0d1117;
        }

        ::-webkit-scrollbar-thumb {
            background: #30363d;
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: #6e7681;
        }

        /* 加载动画 */
        .typing-indicator {
            display: flex;
            gap: 4px;
            padding: 8px 0;
        }

        .typing-indicator span {
            width: 8px;
            height: 8px;
            background: #58a6ff;
            border-radius: 50%;
            animation: typing 1.4s infinite ease-in-out;
        }

        .typing-indicator span:nth-child(2) {
            animation-delay: 0.2s;
        }

        .typing-indicator span:nth-child(3) {
            animation-delay: 0.4s;
        }

        @keyframes typing {
            0%, 60%, 100% { transform: translateY(0); opacity: 0.4; }
            30% { transform: translateY(-4px); opacity: 1; }
        }
    </style>
</head>
<body>
    <div id="app">
        <!-- 头部导航 -->
        <header class="header">
            <div class="header-left">
                <a href="#" class="logo">
                    <!-- Robot Icon -->
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="24" height="24">
                        <rect x="3" y="11" width="18" height="10" rx="2"></rect>
                        <circle cx="12" cy="5" r="2"></circle>
                        <path d="M12 7v4"></path>
                        <line x1="8" y1="16" x2="8" y2="16"></line>
                        <line x1="16" y1="16" x2="16" y2="16"></line>
                    </svg>
                    IntelliTeam
                </a>
                <nav class="nav-links">
                    <a href="#">首页</a>
                    <a href="#">任务</a>
                    <a href="#">智能体</a>
                    <a href="#">技能</a>
                    <a href="#" class="active">AI助手</a>
                </nav>
            </div>
            <span class="offline-badge">离线演示</span>
        </header>

        <!-- 主内容区 -->
        <div class="main-content">
            <!-- 文件浏览器侧边栏 -->
            <aside class="file-sidebar">
                <div class="sidebar-header">
                    <span class="sidebar-title">
                        <!-- Folder Icon -->
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="16" height="16">
                            <path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"></path>
                        </svg>
                        项目文件
                    </span>
                    <button class="input-action-btn" onclick="refreshFileTree()" title="刷新">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="14" height="14">
                            <polyline points="23 4 23 10 17 10"></polyline>
                            <polyline points="1 20 1 14 7 14"></polyline>
                            <path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"></path>
                        </svg>
                    </button>
                </div>
                <div class="file-tree" id="fileTree">
                    <!-- 文件树通过JS渲染 -->
                </div>
            </aside>

            <!-- 聊天区域 -->
            <main class="chat-area">
                <div class="chat-header">
                    <div class="chat-header-icon">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <rect x="3" y="11" width="18" height="10" rx="2"></rect>
                            <circle cx="12" cy="5" r="2"></circle>
                            <path d="M12 7v4"></path>
                            <line x1="8" y1="16" x2="8" y2="16"></line>
                            <line x1="16" y1="16" x2="16" y2="16"></line>
                        </svg>
                    </div>
                    <div class="chat-header-info">
                        <h2>AI 助手</h2>
                        <p>基于 Claude 的智能研发助手 (离线演示模式)</p>
                    </div>
                </div>

                <div class="chat-messages" id="messagesContainer">
                    <!-- 欢迎消息 -->
                    <div class="welcome-message" id="welcomeMessage">
                        <div class="welcome-icon">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <rect x="3" y="11" width="18" height="10" rx="2"></rect>
                                <circle cx="12" cy="5" r="2"></circle>
                                <path d="M12 7v4"></path>
                                <line x1="8" y1="16" x2="8" y2="16"></line>
                                <line x1="16" y1="16" x2="16" y2="16"></line>
                            </svg>
                        </div>
                        <h3>我是您的智能研发助手</h3>
                        <p>我可以帮您编写代码、调试程序、管理项目文件，让开发更高效</p>
                        <div class="quick-actions">
                            <button class="quick-action-btn" onclick="sendQuickMessage('帮我写一个 Python 函数来计算斐波那契数列')">
                                <!-- Code Icon -->
                                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                    <polyline points="16 18 22 12 16 6"></polyline>
                                    <polyline points="8 6 2 12 8 18"></polyline>
                                </svg>
                                编写代码
                            </button>
                            <button class="quick-action-btn" onclick="sendQuickMessage('帮我调试这个错误')">
                                <!-- Bug Icon -->
                                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                    <path d="m8 2 1.88 1.88"></path>
                                    <path d="M14.12 3.88 16 2"></path>
                                    <path d="M9 7.13v-1a3.003 3.003 0 1 1 6 0v1"></path>
                                    <path d="M12 20c-3.3 0-6-2.7-6-6v-3a4 4 0 0 1 4-4h4a4 4 0 0 1 4 4v3c0 3.3-2.7 6-6 6"></path>
                                    <path d="M12 20v-9"></path>
                                    <path d="M6.53 9C4.6 8.8 3 7.1 3 5"></path>
                                    <path d="M6 13H2"></path>
                                    <path d="M3 21c0-2.1 1.7-3.9 3.8-4"></path>
                                    <path d="M20.97 5c0 2.1-1.6 3.8-3.5 4"></path>
                                    <path d="M22 13h-4"></path>
                                    <path d="M17.2 17c2.1.1 3.8 1.9 3.8 4"></path>
                                </svg>
                                调试程序
                            </button>
                            <button class="quick-action-btn" onclick="sendQuickMessage('帮我优化这段代码的性能')">
                                <!-- Zap Icon -->
                                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                    <path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z"></path>
                                </svg>
                                优化性能
                            </button>
                            <button class="quick-action-btn" onclick="sendQuickMessage('帮我生成项目的 README 文档')">
                                <!-- File Text Icon -->
                                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                    <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path>
                                    <polyline points="14 2 14 8 20 8"></polyline>
                                    <line x1="16" y1="13" x2="8" y2="13"></line>
                                    <line x1="16" y1="17" x2="8" y2="17"></line>
                                    <polyline points="10 9 9 9 8 9"></polyline>
                                </svg>
                                生成文档
                            </button>
                        </div>
                    </div>

                    <!-- 消息列表 -->
                    <div id="messagesList"></div>

                    <!-- 加载指示器 -->
                    <div class="message" id="loadingIndicator" style="display: none;">
                        <div class="message-avatar assistant">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <rect x="3" y="11" width="18" height="10" rx="2"></rect>
                                <circle cx="12" cy="5" r="2"></circle>
                                <path d="M12 7v4"></path>
                                <line x1="8" y1="16" x2="8" y2="16"></line>
                                <line x1="16" y1="16" x2="16" y2="16"></line>
                            </svg>
                        </div>
                        <div class="message-content">
                            <div class="message-header">
                                <span class="message-author">AI 助手</span>
                            </div>
                            <div class="message-body">
                                <div class="typing-indicator">
                                    <span></span>
                                    <span></span>
                                    <span></span>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="chat-input-area">
                    <div class="input-container">
                        <div class="input-wrapper">
                            <textarea
                                class="chat-textarea"
                                id="inputMessage"
                                placeholder="输入消息，按 Enter 发送..."
                                rows="1"
                            ></textarea>
                            <div class="input-actions">
                                <button class="input-action-btn" onclick="attachFile()" title="附件">
                                    <!-- Paperclip Icon -->
                                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                        <path d="m21.44 11.05-9.19 9.19a6 6 0 0 1-8.49-8.49l8.57-8.57A4 4 0 1 1 18 8.84l-8.59 8.57a2 2 0 0 1-2.83-2.83l8.49-8.48"></path>
                                    </svg>
                                    附件
                                </button>
                                <button class="input-action-btn" onclick="clearChat()" title="清空聊天">
                                    <!-- Trash Icon -->
                                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                        <polyline points="3 6 5 6 21 6"></polyline>
                                        <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path>
                                        <line x1="10" y1="11" x2="10" y2="17"></line>
                                        <line x1="14" y1="11" x2="14" y2="17"></line>
                                    </svg>
                                    清空
                                </button>
                            </div>
                        </div>
                        <button
                            class="send-btn"
                            id="sendBtn"
                            onclick="sendMessage()"
                            title="发送"
                        >
                            <!-- Send Icon -->
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <line x1="22" y1="2" x2="11" y2="13"></line>
                                <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
                            </svg>
                        </button>
                    </div>
                </div>
            </main>
        </div>
    </div>

    <script>
        // 应用状态
        let messages = [];
        let isLoading = false;

        // SVG图标模板
        const icons = {
            robot: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="10" rx="2"></rect><circle cx="12" cy="5" r="2"></circle><path d="M12 7v4"></path><line x1="8" y1="16" x2="8" y2="16"></line><line x1="16" y1="16" x2="16" y2="16"></line></svg>',
            user: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg>',
            folder: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"></path></svg>',
            file: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M13 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V9z"></path><polyline points="13 2 13 9 20 9"></polyline></svg>'
        };

        // 添加消息到界面
        function addMessage(role, content) {
            messages.push({ role, content, time: new Date() });

            const container = document.getElementById('messagesList');
            const time = formatTime(new Date());
            const author = role === 'user' ? '您' : 'AI 助手';
            const avatarIcon = role === 'user' ? icons.user : icons.robot;

            const messageHtml = `
                <div class="message">
                    <div class="message-avatar ${role}">
                        ${avatarIcon}
                    </div>
                    <div class="message-content">
                        <div class="message-header">
                            <span class="message-author">${author}</span>
                            <span class="message-time">${time}</span>
                        </div>
                        <div class="message-body">${renderMarkdown(content)}</div>
                    </div>
                </div>
            `;

            container.insertAdjacentHTML('beforeend', messageHtml);
            scrollToBottom();
        }

        // 简单的Markdown渲染
        function renderMarkdown(content) {
            // 转义HTML
            let html = content
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;');

            // 代码块
            html = html.replace(/```(\w*)\n([\s\S]*?)```/g, (match, lang, code) => {
                return `<pre><code class="language-${lang}">${code.trim()}</code></pre>`;
            });

            // 行内代码
            html = html.replace(/`([^`]+)`/g, '<code>$1</code>');

            // 粗体
            html = html.replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>');

            // 斜体
            html = html.replace(/\*([^*]+)\*/g, '<em>$1</em>');

            // 标题
            html = html.replace(/^### (.+)$/gm, '<h4>$1</h4>');
            html = html.replace(/^## (.+)$/gm, '<h3>$1</h3>');
            html = html.replace(/^# (.+)$/gm, '<h2>$1</h2>');

            // 列表
            html = html.replace(/^- (.+)$/gm, '<li>$1</li>');
            html = html.replace(/^(\d+)\. (.+)$/gm, '<li>$2</li>');

            // 换行
            html = html.replace(/\n\n/g, '</p><p>');
            html = html.replace(/\n/g, '<br>');

            return '<p>' + html + '</p>';
        }

        // 格式化时间
        function formatTime(date) {
            return date.toLocaleTimeString('zh-CN', { hour: '2-digit', minute: '2-digit' });
        }

        // 滚动到底部
        function scrollToBottom() {
            const container = document.getElementById('messagesContainer');
            container.scrollTop = container.scrollHeight;

            textarea.style.height = 'auto';
            textarea.style.height = Math.min(textarea.scrollHeight, 120) + 'px';

        // 加载聊天历史
        function loadChatHistory() {
            try {
                const history = localStorage.getItem('chatHistory');
                if (history) {
                    messages = JSON.parse(history);
                    if (messages.length > 0) {
                        document.getElementById('welcomeMessage').style.display = 'none';
                        messages.forEach(msg => {
                            const container = document.getElementById('messagesList');
                            const time = formatTime(new Date(msg.time));
                            const author = msg.role === 'user' ? '您' : 'AI 助手';
                            const avatarIcon = msg.role === 'user' ? icons.user : icons.robot;

                            const messageHtml = `
                                <div class="message">
                                    <div class="message-avatar ${msg.role}">
                                        ${avatarIcon}
                                    </div>
                                    <div class="message-content">
                                        <div class="message-header">

                                            <span class="message-time">${time}</span>
                                        </div>
                                        <div class="message-body">${renderMarkdown(msg.content)}</div>
                                    </div>
                                </div>
                            `;
                            container.insertAdjacentHTML('beforeend', messageHtml);
