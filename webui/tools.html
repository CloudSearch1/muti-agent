<!DOCTYPE html>
<html lang="zh-CN" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>工具系统 - IntelliTeam</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script>
        window.tailwind = window.tailwind || {};
        window.tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        gh: {
                            bg: '#0d1117',
                            canvas: '#161b22',
                            elevated: '#21262d',
                            border: '#30363d',
                            text: '#6A737D',
                            light: '#e6edf3',
                            blue: '#0366D6',
                            green: '#33BB22',
                            red: '#DA3633'
                        }
                    }
                }
            }
        };
    </script>
    <style>
        body { background: #0d1117; color: #e6edf3; }
        .nav-link { padding: 8px 16px; border-radius: 6px; transition: all 0.2s; }
        .nav-link:hover { background: rgba(255,255,255,0.1); }
        .nav-link.active { background: rgba(3,102,214,0.2); color: #58a6ff; }
        .tool-card { background: #161b22; border: 1px solid #30363d; border-radius: 8px; padding: 20px; transition: all 0.2s; }
        .tool-card:hover { border-color: #6A737D; transform: translateY(-2px); }
    </style>
</head>
<body class="min-h-screen flex flex-col">
    <!-- 顶部导航栏 -->
    <nav class="bg-gh-canvas border-b border-gh-border sticky top-0 z-50">
        <div class="container mx-auto px-4">
            <div class="flex items-center justify-between h-16">
                <a href="index.html" class="flex items-center space-x-3 text-white font-semibold hover:opacity-80">
                    <div class="w-8 h-8 bg-white/10 rounded-md flex items-center justify-center border border-white/20">
                        <i class="fas fa-robot"></i>
                    </div>
                    <span>IntelliTeam</span>
                </a>
                <div class="hidden md:flex items-center space-x-2">
                    <a href="index.html" class="nav-link text-sm"><i class="fas fa-home mr-2"></i>首页</a>
                    <a href="tools.html" class="nav-link active text-sm"><i class="fas fa-toolbox mr-2"></i>工具系统</a>
                    <a href="agent-monitor.html" class="nav-link text-sm"><i class="fas fa-desktop mr-2"></i>Agent 监控</a>
                    <a href="log-viewer.html" class="nav-link text-sm"><i class="fas fa-file-alt mr-2"></i>日志查看</a>
                    <a href="task-manager.html" class="nav-link text-sm"><i class="fas fa-tasks mr-2"></i>任务管理</a>
                    <a href="workflow-viz.html" class="nav-link text-sm"><i class="fas fa-project-diagram mr-2"></i>工作流</a>
                    <a href="ai-assistant.html" class="nav-link text-sm"><i class="fas fa-comments mr-2"></i>AI 助手</a>
                </div>
                <button class="md:hidden text-gh-text hover:text-white">
                    <i class="fas fa-bars text-xl"></i>
                </button>
            </div>
        </div>
    </nav>

    <!-- 主内容 -->
    <main class="flex-1 container mx-auto px-4 py-6">
        <h1 class="text-2xl font-semibold text-white mb-6"><i class="fas fa-toolbox mr-3 text-gh-blue"></i>工具系统</h1>
        
        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
            <div class="tool-card">
                <div class="flex items-center mb-3">
                    <div class="w-10 h-10 bg-gh-elevated rounded-lg flex items-center justify-center mr-3">
                        <i class="fas fa-terminal text-gh-blue"></i>
                    </div>
                    <h3 class="font-semibold text-white">终端工具</h3>
                </div>
                <p class="text-sm text-gh-text mb-4">执行 shell 命令，管理服务器</p>
                <button class="btn-primary text-sm px-4 py-2 bg-gh-blue hover:bg-blue-600 rounded">打开</button>
            </div>

            <div class="tool-card">
                <div class="flex items-center mb-3">
                    <div class="w-10 h-10 bg-gh-elevated rounded-lg flex items-center justify-center mr-3">
                        <i class="fas fa-database text-green-400"></i>
                    </div>
                    <h3 class="font-semibold text-white">数据库管理</h3>
                </div>
                <p class="text-sm text-gh-text mb-4">查看和管理数据库连接</p>
                <button class="btn-primary text-sm px-4 py-2 bg-gh-blue hover:bg-blue-600 rounded">打开</button>
            </div>

            <div class="tool-card">
                <div class="flex items-center mb-3">
                    <div class="w-10 h-10 bg-gh-elevated rounded-lg flex items-center justify-center mr-3">
                        <i class="fas fa-network-wired text-purple-400"></i>
                    </div>
                    <h3 class="font-semibold text-white">网络工具</h3>
                </div>
                <p class="text-sm text-gh-text mb-4">网络诊断和配置工具</p>
                <button class="btn-primary text-sm px-4 py-2 bg-gh-blue hover:bg-blue-600 rounded">打开</button>
            </div>

            <div class="tool-card">
                <div class="flex items-center mb-3">
                    <div class="w-10 h-10 bg-gh-elevated rounded-lg flex items-center justify-center mr-3">
                        <i class="fas fa-file-code text-yellow-400"></i>
                    </div>
                    <h3 class="font-semibold text-white">代码编辑器</h3>
                </div>
                <p class="text-sm text-gh-text mb-4">在线编辑和预览代码</p>
                <button class="btn-primary text-sm px-4 py-2 bg-gh-blue hover:bg-blue-600 rounded">打开</button>
            </div>

            <div class="tool-card">
                <div class="flex items-center mb-3">
                    <div class="w-10 h-10 bg-gh-elevated rounded-lg flex items-center justify-center mr-3">
                        <i class="fas fa-shield-alt text-red-400"></i>
                    </div>
                    <h3 class="font-semibold text-white">安全工具</h3>
                </div>
                <p class="text-sm text-gh-text mb-4">安全扫描和漏洞检测</p>
                <button class="btn-primary text-sm px-4 py-2 bg-gh-blue hover:bg-blue-600 rounded">打开</button>
            </div>

            <div class="tool-card">
                <div class="flex items-center mb-3">
                    <div class="w-10 h-10 bg-gh-elevated rounded-lg flex items-center justify-center mr-3">
                        <i class="fas fa-cog text-gh-text"></i>
                    </div>
                    <h3 class="font-semibold text-white">系统设置</h3>
                </div>
                <p class="text-sm text-gh-text mb-4">配置系统参数和选项</p>
                <button class="btn-primary text-sm px-4 py-2 bg-gh-blue hover:bg-blue-600 rounded">打开</button>
            </div>
        </div>
    </main>

    <footer class="bg-gh-canvas border-t border-gh-border py-4 mt-8">
        <div class="container mx-auto px-4 text-center text-sm text-gh-text">
            IntelliTeam 工具系统 © 2026
        </div>
    </footer>
</body>
</html>
