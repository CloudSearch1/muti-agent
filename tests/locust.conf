# 性能测试配置

locustfile = "tests/locustfile.py"

# 测试场景
[scenarios]

# 场景 1: 正常负载
[normal_load]
users = 100
spawn_rate = 10
run_time = "5m"

# 场景 2: 峰值负载
[peak_load]
users = 500
spawn_rate = 50
